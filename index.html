<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; margin: 20px; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; }
        input { width: 90%; padding: 10px; margin: 10px 0; background: #333; border: 1px solid #555; color: #fff; border-radius: 5px; }
        button { background: #00a884; color: #fff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
        h3 { color: #00a884; border-bottom: 1px solid #333; padding-bottom: 10px; }
    </style>
</head>
<body>

    <div class="dashboard">
        <!-- كارت إضافة البيانات -->
        <div class="card">
            <h3>تسجيل اليومية</h3>
            <input type="number" id="sales" placeholder="المبيعات (ج.م)">
            <input type="number" id="expenses" placeholder="المصروفات (ج.م)">
            <button onclick="saveData()">حفظ البيانات 💾</button>
        </div>

        <!-- كارت عرض الداتا -->
        <div class="card">
            <h3>ملخص اليوم</h3>
            <p id="status">جاهز للاستخدام... 🚀</p>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "YOUR_SCRIPT_URL_HERE"; // <--- حط الرابط بتاعك هنا

        function saveData() {
            const sales = document.getElementById('sales').value;
            const expenses = document.getElementById('expenses').value;
            const status = document.getElementById('status');

            status.innerText = "جاري الحفظ...";

            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sales: sales, expenses: expenses })
            })
            .then(() => {
                status.innerText = "تم الحفظ يا دكتور! ✅";
                setTimeout(() => status.innerText = "جاهز للاستخدام... 🚀", 3000);
            })
            .catch(err => {
                status.innerText = "في مشكلة حصلت! ❌";
                console.error(err);
            });
        }
    </script>
</body>
</html>
