<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <style>
        body { font-family: sans-serif; background-color: #1a1a1a; color: white; margin: 20px; }
        .dashboard { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 20px; }
        .card { background: #2d2d2d; padding: 15px; border-radius: 8px; border: 1px solid #444; }
        h3 { border-bottom: 2px solid #00a884; padding-bottom: 10px; }
        input { width: 100%; margin-bottom: 5px; background: #333; color: white; border: 1px solid #555; padding: 5px; }
        button { background: #00a884; color: white; border: none; padding: 10px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <div class="dashboard">
        <!-- 1. جدول اليومية -->
        <div class="card">
            <h3>جدول اليومية</h3>
            <table width="100%">
                <tr><th>التاريخ</th><th>المبيعات</th><th>المصاريف</th></tr>
                <!-- هنا هيتحط الكود اللي بيسحب من الشيت -->
            </table>
        </div>

        <!-- 2. المشتريات والمصاريف -->
        <div class="card">
            <h3>المشتريات اليوم</h3>
            <input placeholder="المبلغ">
            <h3>مصروفات اليوم</h3>
            <input placeholder="نوع المصروف">
            <button>إضافة مصروف</button>
        </div>

        <!-- 3. شفتات الموظفين -->
        <div class="card">
            <h3>الموظفين</h3>
            <p>عم جمال: <span>شفت</span></p>
            <p>عمر: <span>شفت</span></p>
        </div>
    </div>

</body>
</html>
