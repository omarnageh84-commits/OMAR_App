<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; margin: 0; padding: 15px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tabs button { padding: 10px 20px; background: #333; border: none; color: #fff; border-radius: 8px; cursor: pointer; }
        .tabs button.active { background: #00a884; }
        
        /* إخفاء الصفحات غير النشطة */
        .page { display: none; }
        .page.active { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; }
        h3 { color: #00a884; border-bottom: 1px solid #333; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td, th { padding: 8px; text-align: center; }
        input, select { width: 90%; background: #222; border: 1px solid #444; color: #fff; padding: 6px; border-radius: 4px; }
        .action { background: #00a884; border: none; padding: 10px; color: #fff; width: 100%; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="tabs">
    <button class="active" onclick="switchTab(this, 'home')">يومية اليوم</button>
    <button onclick="switchTab(this, 'database')">قاعدة البيانات</button>
    <button onclick="switchTab(this, 'settings')">الإعدادات</button>
</div>

<!-- صفحة اليومية -->
<div id="home" class="page active">
    <div class="card">
        <h3>تقفيلات الموظفين</h3>
        <table>
            <thead><tr><th>الاسم</th><th>أساسي</th><th>شفت</th></tr></thead>
            <tbody id="staff-body"></tbody>
        </table>
    </div>
    <div class="card">
        <h3>المصروفات والمشتريات</h3>
        <input placeholder="اسم المصروف">
        <input type="number" placeholder="القيمة">
        <button class="action">إضافة</button>
    </div>
</div>

<!-- صفحة قاعدة البيانات -->
<div id="database" class="page">
    <div class="card" style="grid-column: 1 / -1;">
        <h3>سجل العمليات التاريخي</h3>
        <button class="action">تحديث البيانات من Google Sheets</button>
    </div>
</div>

<div id="settings" class="page">
    <div class="card" style="grid-column: 1 / -1;"><h3>الإعدادات</h3><p>قريباً...</p></div>
</div>

<script>
    function switchTab(btn, pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        btn.classList.add('active');
    }

    // توليد الموظفين
    const employees = ["عم جمال", "عمر", "د. خالد", "د. محمد", "د. محمود", "موظف 6", "موظف 7"];
    const tbody = document.getElementById('staff-body');
    employees.forEach(name => {
        tbody.innerHTML += `<tr><td><select><option>${name}</option></select></td><td><input></td><td><input></td></tr>`;
    });
</script>
</body>
</html>
