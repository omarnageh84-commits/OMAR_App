<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; margin: 0; padding: 15px; }
        /* نظام التبويبات */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tabs button { padding: 10px 20px; background: #333; border: none; color: #fff; border-radius: 8px; cursor: pointer; }
        .tabs button.active { background: #00a884; }
        .page { display: none; }
        .page.active { display: block; }
        
        /* تصميم الكاردز والجدول */
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; }
        h3 { color: #00a884; border-bottom: 1px solid #333; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td, th { padding: 8px; text-align: center; }
        input, select { width: 90%; background: #222; border: 1px solid #444; color: #fff; padding: 6px; border-radius: 4px; }
        .action { background: #00a884; border: none; padding: 10px; color: #fff; width: 100%; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<!-- شريط التنقل -->
<div class="tabs">
    <button class="active" onclick="showPage('home')">يومية اليوم</button>
    <button onclick="showPage('database')">قاعدة البيانات</button>
    <button onclick="showPage('settings')">الإعدادات</button>
</div>

<!-- صفحة اليومية -->
<div id="home" class="page active">
    <div class="dashboard">
        <!-- هنا هنحط كود جدول الموظفين والمصروفات اللي عملناه -->
        <div class="card"><h3>تقفيلات الموظفين</h3>...</div>
        <div class="card"><h3>المصروفات والمشتريات</h3>...</div>
    </div>
</div>

<!-- صفحة قاعدة البيانات -->
<div id="database" class="page">
    <div class="card">
        <h3>سجل العمليات التاريخي</h3>
        <p>جاري تحميل البيانات من Google Sheets... 📊</p>
        <button class="action" onclick="alert('جارٍ الربط بالـ API')">تحديث البيانات</button>
    </div>
</div>

<script>
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        event.target.classList.add('active');
    }
</script>
</body>
</html>
