<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 12px; border: 1px solid #333; }
        h3 { color: #00a884; margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .row { display: flex; justify-content: space-between; padding: 5px 0; align-items: center; }
        input { width: 60px; background: #333; border: 1px solid #555; color: #fff; padding: 5px; border-radius: 4px; text-align: center; }
        button.action { background: #00a884; border: none; padding: 10px; color: #fff; width: 100%; border-radius: 5px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="dashboard">
    <!-- قسم الموظفين -->
    <div class="card">
        <h3>تقفيلات الموظفين</h3>
        <div class="row"><span>الاسم</span> <span>أساسي</span> <span>شفت</span></div>
        <div id="staff-rows"></div>
    </div>

    <!-- قسم المصروفات والمشتريات -->
    <div class="card">
        <h3>المصروفات والمشتريات</h3>
        <input type="text" style="width: 90%" placeholder="اسم المصروف">
        <input type="number" placeholder="القيمة">
        <button class="action">+ إضافة مصروف</button>
        <hr style="border: 0; border-top: 1px solid #333; margin: 15px 0;">
        <input type="text" style="width: 90%" placeholder="اسم المشتريات">
        <input type="number" placeholder="القيمة">
        <button class="action">+ إضافة شراء</button>
    </div>

    <!-- قسم التحويلات -->
    <div class="card">
        <h3>جدول المحافظ</h3>
        <p>💰 فودافون كاش: 01099478956</p>
        <p>📱 إنستا باي: 01007036085</p>
        <button class="action" onclick="window.open('https://wa.me/201007036085')">💬 التواصل واتساب</button>
    </div>
</div>

<script>
    // إنشاء 7 صفوف موظفين ثابتة
    const staffNames = ["عم جمال", "عمر", "د. خالد", "د. محمد", "د. محمود", "موظف 6", "موظف 7"];
    const container = document.getElementById('staff-rows');
    staffNames.forEach(name => {
        container.innerHTML += `
            <div class="row">
                <span>${name}</span>
                <input type="number" placeholder="أساسي">
                <input type="number" placeholder="شفت">
            </div>`;
    });
</script>
</body>
</html>
